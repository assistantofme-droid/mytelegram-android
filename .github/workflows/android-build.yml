name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      # مهم‌ترین بخش: افزایش heap size جاوا برای Gradle
      # چون بدون این، zipflinger موقع پکیج کردن APK با کد نیتیو سنگین OOM می‌خوره
      - name: Configure Gradle memory
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.workers.max=2
          android.enableJetifier=true
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # فقط یک variant می‌سازیم (App) نه هر ۴ تا (App, AppHockeyApp, AppHuawei, AppStandalone)
      # این هم رم مصرفی رو کم می‌کنه هم وقت build رو
      # اگه واریانت دیگه‌ای می‌خوای اسمش رو عوض کن، مثلا assembleHuaweiAfatDebug
      - name: Build debug APK
        run: ./gradlew :TMessagesProj_App:assembleAfatDebug --stacktrace --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" -path "*afat*Debug*" | head -n 1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
